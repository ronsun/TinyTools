<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoreTemp CSV Viewer (Serverless)</title>
    <style>
      :root {
        color-scheme: dark light;
        /* VS Code–like dark palette */
        --bg: #1e1e1e;
        --panel: #252526;
        --muted: #9da5b4;
        --fg: #d4d4d4;
        --accent: #569cd6; /* VS Code blue */
        --warn: #d7ba7d;
        --danger: #f14c4c;
        --border: #3c3c3c;
        --chip: #2a2a2a;
        --radius: 12px;
        --font: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, sans-serif;
        /* Chart auxiliary */
        --chart-grid: #2e2e2e;
        --chart-axis: #5a5a5a;
        --chart-dim: rgba(30,30,30,.55);
        --chart-tip-bg: #2b2b2c;
        --chart-tip-stroke: #3c3c3c;
        --chart-marker: #1e1e1e;
      }
      * { box-sizing: border-box }
      html, body { height: 100% }
      body { margin: 0; padding: 20px; font-family: var(--font); background: var(--bg); color: var(--fg); }
      .app { max-width: 1200px; margin: 0 auto; }
      .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,.35); padding: 14px 16px; }
      header { display: grid; gap: 10px; align-items: center; grid-template-columns: auto 1fr; margin-bottom: 14px; }
      .title { display: flex; flex-direction: column; gap: 4px }
      .title h1 { font-size: 18px; margin: 0; letter-spacing: .02em }
      .title small { color: var(--muted) }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end }
      .group { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px }
      button, select, input[type=number] { background: var(--chip); color: var(--fg); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; padding: 6px 10px; min-height: 30px; }
      button { cursor: pointer }
      button.primary { border-color: rgba(86,156,214,.5); box-shadow: 0 0 0 1px rgba(0,0,0,.35), 0 0 12px rgba(86,156,214,.2) }
      button:disabled { opacity: .6; cursor: not-allowed }
      main.panel { padding: 12px }
      .chart-wrap { height: 420px; position: relative }
      canvas { width: 100% !important; height: 100% !important; display: block; cursor: crosshair }
      .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap }
      .chips { display: flex; gap: 6px; flex-wrap: wrap; max-height: 96px; overflow: auto; padding-right: 4px }
      .chip { display: inline-flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--chip); color: var(--muted); font-size: 12px }
      .swatch { width: 10px; height: 10px; border-radius: 999px; box-shadow: 0 0 0 2px var(--panel) inset, 0 0 0 1px var(--border) }
      .chip input { width: 14px; height: 14px; accent-color: var(--accent) }
      .status { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap }
      .pill { border: 1px solid var(--border); background: var(--chip); border-radius: 999px; padding: 3px 8px; display: inline-flex; gap: 6px; align-items: center }
      .dot { width: 6px; height: 6px; border-radius: 999px }
      .dot.ok { background: #22c55e }
      .dot.off { background: #6b7280 }
      .dot.err { background: #ef4444 }
      .err { color: #fca5a5 }
      @media (max-width: 768px) { .chart-wrap{ height: 320px } body{ padding: 12px } }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="panel">
        <header>
          <div class="title">
            <h1>CoreTemp Log 圖表（純前端）</h1>
            <small>* 數值自動 ÷ 1000，單位：°C</small>
          </div>
          <div class="controls">
            <div class="group">
              <span>資料夾</span>
              <button id="btnPickDir">選擇資料夾</button>
              <span id="lblDir" style="max-width:260px; overflow:hidden; text-overflow:ellipsis"></span>
            </div>
            <div class="group">
              <span>多檔</span>
              <button id="btnPickFiles">選擇 CSV</button>
              <span id="lblFiles" style="max-width:260px; overflow:hidden; text-overflow:ellipsis"></span>
            </div>
            <div class="group">
              <span>Log</span>
              <select id="selLog" disabled></select>
            </div>
            <div class="group">
              <label style="display:inline-flex;align-items:center;gap:6px">
                <input id="chkAuto" type="checkbox" /> 自動更新
              </label>
            </div>
            <div class="group">
              <span>間隔</span>
              <input id="numSec" type="number" min="3" value="30" style="width:72px" />
              <span>秒</span>
            </div>
            <div class="group">
              <span>精度</span>
              <select id="selStep" style="width:90px">
                <option value="1">完整</option>
                <option value="2">每 2 點</option>
                <option value="5">每 5 點</option>
                <option value="10">每 10 點</option>
              </select>
            </div>
            <button id="btnRefresh">立即刷新</button>
            <!-- fallbacks -->
            <input id="inputDir" type="file" hidden webkitdirectory directory multiple />
            <input id="inputFiles" type="file" hidden accept=".csv,text/csv" multiple />
          </div>
        </header>

        <main class="panel">
          <div class="chart-wrap"><canvas id="canvas"></canvas></div>

          <div class="row" style="margin-top:10px">
            <div style="display:flex; gap:8px; align-items:flex-start; flex:1 1 auto; min-width:0">
              <span class="group" style="padding-top:4px">顯示核心：</span>
              <div id="coreChips" class="chips"></div>
            </div>
            <div style="display:flex; gap:6px; flex-wrap:wrap">
              <button id="btnAll" class="primary">全選</button>
              <button id="btnNone">全不選</button>
              <button id="btnAvg">只看平均</button>
              <button id="btnZoomOut">縮小 ▼</button>
              <button id="btnZoomReset">重設範圍</button>
            </div>
          </div>

          <div class="row" style="margin-top:10px">
            <div class="status">
              <span class="pill"><span class="dot off" id="dotAuto"></span><span>AUTO</span><span id="txtAuto">關閉</span></span>
              <span class="pill"><span>FILE</span><span id="txtFile">尚未載入</span></span>
              <span class="pill"><span>POINTS</span><span id="txtPts">0</span></span>
              <span class="pill" id="pillZoom" style="display:none"><span>ZOOM</span><span id="txtZoom"></span></span>
            </div>
            <div class="status"><span id="txtErr" class="err"></span></div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // ---- State ----
      const DIVIDE_BY = 1000;
      const AVG = '__AVG__';
      const el = (id)=>document.getElementById(id);
      const btnPickDir=el('btnPickDir'), btnPickFiles=el('btnPickFiles');
      const inputDir=el('inputDir'), inputFiles=el('inputFiles');
      const lblDir=el('lblDir'), lblFiles=el('lblFiles');
      const selLog=el('selLog');
      const chkAuto=el('chkAuto'), numSec=el('numSec');
      const selStep=el('selStep'), btnRefresh=el('btnRefresh');
      const coreChips=el('coreChips');
      const btnAll=el('btnAll'), btnNone=el('btnNone'), btnAvg=el('btnAvg');
      const btnZoomOut=el('btnZoomOut'), btnZoomReset=el('btnZoomReset');
      const dotAuto=el('dotAuto'), txtAuto=el('txtAuto');
      const txtFile=el('txtFile'), txtPts=el('txtPts'), txtErr=el('txtErr');
      const pillZoom=el('pillZoom'), txtZoom=el('txtZoom');
      const canvas=el('canvas');

      let fileEntries=[]; // {handle:{getFile()}, name, label, lastModified}
      let lastEntry=null;
      let parsed=null; // {labels, series, displayNames}
      let selected=new Set();
      let step=1; let hoverName=null; let hoverIndex=null;
      let timer=null; let seriesOrder=[];
      // Zoom state
      let zoomStart=0, zoomEnd=null; // index range for zoom (null=full)
      let dragStart=null, dragEnd=null; // mouse drag for selecting range

      // ---- Utils ----
      const fmtTime=(ms)=> new Date(ms||0).toLocaleString();
      const sortByMtime=(a,b)=> b.lastModified-a.lastModified;
      const palette=[
        '#4C78A8','#F58518','#54A24B','#E45756','#72B7B2','#EECA3B',
        '#B279A2','#FF9DA6','#9D755D','#BAB0AC','#1F77B4','#F28E2B'
      ];
      const colorOf=(name)=>{ const i=seriesOrder.indexOf(name); return palette[(i>=0?i:0)%palette.length]; };
      const cssVar=(name)=> getComputedStyle(document.documentElement).getPropertyValue(name).trim();

      // ---- CSV ----
      function parseCsv(text){
        if(text.charCodeAt(0)===0xfeff) text=text.slice(1);
        const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
        const hi=lines.findIndex(l=>/^Time,/.test(l));
        if(hi<0) throw new Error('找不到標題列 (Time,...)');
        const headers=lines[hi].split(',').map(s=>s.trim());
        const idx={}; const series={}; const names={};
        headers.forEach((h,i)=>{ if(/^Cur\. CPU #0 Core #\d+$/.test(h)){ idx[h]=i; series[h]=[]; const m=h.match(/Core #(\d+)$/); names[h]='Core '+(m?m[1]:'?'); }});
        if(!Object.keys(idx).length) throw new Error('沒有核心 Cur. 欄位');
        series[AVG]=[]; names[AVG]='全部核心平均';
        const labels=[];
        for(let k=hi+1;k<lines.length;k++){
          const cols=lines[k].split(','); if(!cols.length||!cols[0].trim()) continue;
          labels.push(cols[0].trim());
          let sum=0,cnt=0;
          for(const [key,i] of Object.entries(idx)){
            const v=Number((cols[i]||'').trim());
            if(Number.isFinite(v)){ const x=v/DIVIDE_BY; series[key].push(x); sum+=x; cnt++; } else series[key].push(null);
          }
          series[AVG].push(cnt?sum/cnt:null);
        }
        return {labels, series, displayNames:names};
      }

      // ---- Chart ----
      function updateZoomInfo(){
        if(!parsed){ pillZoom.style.display='none'; return; }
        if(zoomEnd!=null){
          const fullN=parsed.labels.length;
          const startIdx=Math.max(0,zoomStart);
          const endIdx=Math.min(fullN-1,zoomEnd);
          const pct=((endIdx-startIdx+1)/fullN*100).toFixed(1);
          txtZoom.textContent=`${parsed.labels[startIdx]} ~ ${parsed.labels[endIdx]} (${pct}%)`;
          pillZoom.style.display='inline-flex';
          btnZoomOut.disabled=false;
          btnZoomReset.disabled=false;
        }else{
          pillZoom.style.display='none';
          btnZoomOut.disabled=true;
          btnZoomReset.disabled=true;
        }
      }

      function draw(){
        const ctx=canvas.getContext('2d');
        const dpr=window.devicePixelRatio||1; const cw=canvas.parentElement.clientWidth||600; const ch=canvas.parentElement.clientHeight||400;
        canvas.width=cw*dpr; canvas.height=ch*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
        const pad={t:30,r:20,b:40,l:55}; const w=cw-pad.l-pad.r, h=ch-pad.t-pad.b;
        // background
        ctx.clearRect(0,0,cw,ch); ctx.fillStyle=cssVar('--panel')||'#252526'; ctx.fillRect(0,0,cw,ch);
        if(!parsed){ updateZoomInfo(); return; }
        // Apply zoom range
        const fullN=parsed.labels.length;
        const startIdx=Math.max(0,zoomStart);
        const endIdx=zoomEnd!=null? Math.min(fullN-1,zoomEnd) : fullN-1;
        const entries=Object.entries(parsed.series);
        const vis=[...selected].length?entries.filter(([k])=>selected.has(k)):[];
        // Compute min/max within zoom range
        let min=Infinity,max=-Infinity;
        vis.forEach(([,arr])=>{ for(let i=startIdx;i<=endIdx;i++){ const v=arr[i]; if(v==null||!Number.isFinite(v)) continue; if(v<min)min=v; if(v>max)max=v; }});
        if(!Number.isFinite(min)||!Number.isFinite(max)){ updateZoomInfo(); return; }
        const range=max-min||1; min-=range*.1; max+=range*.1;
        const n=endIdx-startIdx+1; const xstep=n>1? w/(n-1):w;
        const x=i=> pad.l+(i-startIdx)*xstep; const y=v=> pad.t+h-((v-min)/(max-min))*h;
        // grid + axes
        ctx.strokeStyle=cssVar('--chart-grid')||'#2e2e2e'; ctx.lineWidth=1; ctx.font='10px system-ui'; ctx.fillStyle=cssVar('--muted')||'#9da5b4';
        for(let i=0;i<=5;i++){ const yy=pad.t+h-i*h/5; ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(pad.l+w,yy); ctx.stroke(); ctx.fillText((min+(max-min)*i/5).toFixed(1), pad.l-6, yy); }
        ctx.textAlign='center'; ctx.textBaseline='top'; const maxTicks=10; const stepX=Math.max(1, Math.round(n/maxTicks));
        for(let i=startIdx;i<=endIdx;i+=stepX){ ctx.fillText(parsed.labels[i]||'', x(i), pad.t+h+6); }
        ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+h); ctx.moveTo(pad.l,pad.t+h); ctx.lineTo(pad.l+w,pad.t+h); ctx.strokeStyle=cssVar('--chart-axis')||'#5a5a5a'; ctx.stroke();
        // lines
        ctx.lineJoin='round'; ctx.lineCap='round';
        vis.forEach(([name,data])=>{ const color=colorOf(name); ctx.strokeStyle=color; ctx.lineWidth=1.8; ctx.beginPath(); let started=false; const s=Math.max(1,step|0); for(let k=startIdx;k<=endIdx;k+=s){ const v=data[k]; if(v==null){ started=false; continue;} const xx=x(k), yy=y(v); if(!started){ ctx.moveTo(xx,yy); started=true; } else ctx.lineTo(xx,yy);} ctx.stroke(); });
        // dim + highlight
        if(hoverName){ ctx.save(); ctx.fillStyle=cssVar('--chart-dim')||'rgba(30,30,30,.55)'; ctx.fillRect(pad.l,pad.t,w,h); ctx.restore(); const idx=vis.findIndex(([n])=>n===hoverName); if(idx>=0){ const [,data]=vis[idx]; const color=colorOf(hoverName); ctx.strokeStyle=color; ctx.lineWidth=3; ctx.beginPath(); let started=false; const s=Math.max(1,step|0); for(let k=startIdx;k<=endIdx;k+=s){ const v=data[k]; if(v==null){ started=false; continue;} const xx=x(k), yy=y(v); if(!started){ ctx.moveTo(xx,yy); started=true;} else ctx.lineTo(xx,yy);} ctx.stroke(); }}
        // Drag selection overlay
        if(dragStart!=null && dragEnd!=null){ ctx.save(); const x1=Math.min(dragStart.x,dragEnd.x); const x2=Math.max(dragStart.x,dragEnd.x); ctx.fillStyle='rgba(86,156,214,.15)'; ctx.fillRect(x1,pad.t,x2-x1,h); ctx.strokeStyle='rgba(86,156,214,.6)'; ctx.lineWidth=1; ctx.strokeRect(x1,pad.t,x2-x1,h); ctx.restore(); }
        // point + tooltip
        if(hoverName!=null && hoverIndex!=null){ const arr=parsed.series[hoverName]; const v=arr&&arr[hoverIndex]; if(Number.isFinite(v)){ const xx=x(hoverIndex), yy=y(v); const color=colorOf(hoverName); ctx.save(); ctx.fillStyle=cssVar('--chart-marker')||'#1e1e1e'; ctx.beginPath(); ctx.arc(xx,yy,4,0,Math.PI*2); ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=color; ctx.beginPath(); ctx.arc(xx,yy,4,0,Math.PI*2); ctx.stroke(); const label=(parsed.displayNames&&parsed.displayNames[hoverName])||hoverName; const tip=[label, parsed.labels[hoverIndex]||'', v.toFixed(3)+' °C']; ctx.font='11px system-ui'; const padBox=6; let mw=0; tip.forEach(t=>mw=Math.max(mw, ctx.measureText(t).width)); const bw=mw+padBox*2, bh=tip.length*14+padBox*2; let bx=xx+12, by=yy-bh-8; if(bx+bw>pad.l+w) bx=xx-bw-12; if(by<pad.t) by=yy+12; ctx.fillStyle=cssVar('--chart-tip-bg')||'#2b2b2c'; ctx.strokeStyle=cssVar('--chart-tip-stroke')||'#3c3c3c'; ctx.lineWidth=1; const r=6; ctx.beginPath(); ctx.moveTo(bx+r,by); ctx.lineTo(bx+bw-r,by); ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r); ctx.lineTo(bx+bw,by+bh-r); ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh); ctx.lineTo(bx+r,by+bh); ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r); ctx.lineTo(bx,by+r); ctx.quadraticCurveTo(bx,by,bx+r,by); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle=cssVar('--fg')||'#d4d4d4'; ctx.textAlign='left'; ctx.textBaseline='top'; let ty=by+padBox; tip.forEach(t=>{ ctx.fillText(t,bx+padBox,ty); ty+=14;}); ctx.restore(); }}
        updateZoomInfo();
      }

      // ---- UI build ----
      function rebuildCoreChips(){
        coreChips.innerHTML=''; if(!parsed) return;
        Object.keys(parsed.series).forEach((name)=>{
          const label=(parsed.displayNames&&parsed.displayNames[name])||name;
          const lab=document.createElement('label'); lab.className='chip';
          const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=selected.has(name);
          cb.addEventListener('change',()=>{ if(cb.checked) selected.add(name); else selected.delete(name); draw(); });
          const dot=document.createElement('span'); dot.className='swatch'; dot.style.backgroundColor=colorOf(name);
          const span=document.createElement('span'); span.textContent=label;
          lab.appendChild(cb); lab.appendChild(dot); lab.appendChild(span);
          coreChips.appendChild(lab);
        });
      }

      function rebuildSelect(){
        selLog.innerHTML=''; if(!fileEntries.length){ const o=document.createElement('option'); o.value=''; o.textContent='尚未選擇檔案'; selLog.appendChild(o); selLog.disabled=true; return; }
        fileEntries.forEach((e,i)=>{ const o=document.createElement('option'); o.value=String(i); o.textContent=e.label; if(i===0) o.selected=true; selLog.appendChild(o); }); selLog.disabled=false;
      }

      // ---- Load ----
      async function loadEntry(entry, opts={}){
        const {preserve=false, silent=false}=opts; txtErr.textContent='';
        try{
          const file=await entry.handle.getFile(); const text=await file.text();
          const data=parseCsv(text);
          seriesOrder=Object.keys(data.series); // stable order for colors
          if(preserve && selected.size){ const keep=new Set([...selected].filter(k=>data.series[k])); selected= keep.size? keep : new Set(Object.keys(data.series)); }
          else { selected=new Set(Object.keys(data.series)); }
          parsed=data; 
          // Reset zoom when loading new file
          if(!preserve){ zoomStart=0; zoomEnd=null; }
          rebuildCoreChips(); draw();
          txtFile.textContent= entry.label||entry.name; txtPts.textContent= data.labels.length;
          lastEntry=entry;
        }catch(e){ console.error(e); if(!silent) txtErr.textContent='載入失敗：'+(e?.message||e); }
      }

      // ---- Events ----
      btnPickDir.addEventListener('click', async()=>{
        txtErr.textContent=''; try{
          if(!window.showDirectoryPicker){ inputDir.click(); return; }
          const dir=await window.showDirectoryPicker(); lblDir.textContent=dir.name||'';
          fileEntries=[]; for await (const ent of dir.values()){ if(ent.kind==='file' && ent.name.toLowerCase().endsWith('.csv')){ const f=await ent.getFile(); fileEntries.push({handle:ent, name:ent.name, lastModified:f.lastModified||0, label:`${ent.name} (${fmtTime(f.lastModified)})`}); }}
          fileEntries.sort(sortByMtime); rebuildSelect(); if(fileEntries.length) await loadEntry(fileEntries[0]); else txtErr.textContent='資料夾內無 .csv';
        }catch(e){ if(e?.name==='AbortError') return; txtErr.textContent='讀取資料夾失敗：'+(e?.message||e); }
      });

      btnPickFiles.addEventListener('click', async()=>{
        txtErr.textContent=''; try{
          if(!window.showOpenFilePicker){ inputFiles.click(); return; }
          const handles=await window.showOpenFilePicker({ multiple:true, types:[{description:'CSV', accept:{'text/csv':['.csv'],'text/plain':['.csv']}}]});
          fileEntries=[]; for(const h of handles){ const f=await h.getFile(); fileEntries.push({handle:h, name:f.name, lastModified:f.lastModified||0, label:`${f.name} (${fmtTime(f.lastModified)})`}); }
          fileEntries.sort(sortByMtime);
          lblFiles.textContent= fileEntries.length? (fileEntries.length===1? fileEntries[0].name : `${fileEntries[0].name} 等 ${fileEntries.length} 檔`) : '';
          rebuildSelect(); if(fileEntries.length) await loadEntry(fileEntries[0]); else txtErr.textContent='未選取 .csv';
        }catch(e){ if(e?.name==='AbortError') return; txtErr.textContent='讀取檔案失敗：'+(e?.message||e); }
      });

      inputDir.addEventListener('change', async()=>{
        try{
          const files=[...(inputDir.files||[])].filter(f=>f.name.toLowerCase().endsWith('.csv'));
          if(!files.length){ txtErr.textContent='資料夾內無 .csv'; return; }
          const rel=(files[0].webkitRelativePath||files[0].name); lblDir.textContent=(rel.split('/')[0]||'(本機)');
          fileEntries=files.map(f=>({handle:{getFile:async()=>f}, name:f.name, lastModified:f.lastModified||0, label:`${f.name} (${fmtTime(f.lastModified)})`}));
          fileEntries.sort(sortByMtime); rebuildSelect(); await loadEntry(fileEntries[0]);
        }catch(e){ txtErr.textContent='讀取資料夾失敗：'+(e?.message||e); }
      });

      inputFiles.addEventListener('change', async()=>{
        try{
          const files=[...(inputFiles.files||[])].filter(f=>f.name.toLowerCase().endsWith('.csv'));
          if(!files.length){ txtErr.textContent='未選取 .csv'; return; }
          fileEntries=files.map(f=>({handle:{getFile:async()=>f}, name:f.name, lastModified:f.lastModified||0, label:`${f.name} (${fmtTime(f.lastModified)})`}));
          fileEntries.sort(sortByMtime);
          lblFiles.textContent= files.length===1? files[0].name : `${files[0].name} 等 ${files.length} 檔`;
          rebuildSelect(); await loadEntry(fileEntries[0]);
        }catch(e){ txtErr.textContent='讀取檔案失敗：'+(e?.message||e); }
      });

      selLog.addEventListener('change',()=>{ const i=Number(selLog.value); if(Number.isInteger(i) && fileEntries[i]) loadEntry(fileEntries[i]); });
      // Preserve selection on manual refresh
      btnRefresh.addEventListener('click',()=>{ if(lastEntry) loadEntry(lastEntry,{preserve:true}); });
      selStep.addEventListener('change',()=>{ const v=parseInt(selStep.value,10); step=Number.isFinite(v)&&v>0?v:1; draw(); });
      btnAll.addEventListener('click',()=>{ if(!parsed) return; selected=new Set(Object.keys(parsed.series)); rebuildCoreChips(); draw(); });
      btnNone.addEventListener('click',()=>{ if(!parsed) return; selected=new Set(); rebuildCoreChips(); draw(); });
      btnAvg.addEventListener('click',()=>{ if(!parsed) return; if(!parsed.series[AVG]) return; selected=new Set([AVG]); rebuildCoreChips(); draw(); });

      // Zoom buttons
      btnZoomOut.addEventListener('click',()=>{
        if(!parsed) return;
        const fullN=parsed.labels.length;
        if(zoomEnd===null){ return; } // already at full view
        const currentStart=Math.max(0,zoomStart);
        const currentEnd=Math.min(fullN-1,zoomEnd);
        const currentRange=currentEnd-currentStart+1;
        const newRange=Math.min(fullN, Math.ceil(currentRange*1.5));
        const center=Math.floor((currentStart+currentEnd)/2);
        let newStart=Math.max(0, center-Math.floor(newRange/2));
        let newEnd=Math.min(fullN-1, newStart+newRange-1);
        // adjust if hit boundary
        if(newEnd>=fullN-1){ newEnd=fullN-1; newStart=Math.max(0,fullN-newRange); }
        // if expanded to full view, reset
        if(newStart===0 && newEnd===fullN-1){ zoomStart=0; zoomEnd=null; }
        else{ zoomStart=newStart; zoomEnd=newEnd; }
        draw();
      });

      btnZoomReset.addEventListener('click',()=>{
        zoomStart=0; zoomEnd=null; draw();
      });

      chkAuto.addEventListener('change',()=>{ setAuto(chkAuto.checked); });
      numSec.addEventListener('change',()=>{ if(chkAuto.checked) setAuto(true); });

      function setAuto(on){
        if(timer){ clearInterval(timer); timer=null; }
        if(on){ let s=parseInt(numSec.value,10); if(!Number.isFinite(s)||s<3){ s=3; numSec.value='3'; }
          timer=setInterval(()=>{ if(lastEntry) loadEntry(lastEntry,{preserve:true, silent:true}); }, s*1000);
          txtAuto.textContent=`開啟，每 ${numSec.value} 秒`; dotAuto.classList.remove('off','err'); dotAuto.classList.add('ok');
        } else { txtAuto.textContent='關閉'; dotAuto.classList.remove('ok','err'); dotAuto.classList.add('off'); }
      }

      // Hover interactions + drag to zoom
      canvas.addEventListener('mousedown',(e)=>{
        if(!parsed) return; const rect=canvas.getBoundingClientRect(); dragStart={x:e.clientX-rect.left, y:e.clientY-rect.top}; dragEnd=null;
      });
      canvas.addEventListener('mousemove', (e)=>{
        if(!parsed){ return; }
        const rect=canvas.getBoundingClientRect(); const mx=e.clientX-rect.left; const my=e.clientY-rect.top;
        const cw=rect.width, ch=rect.height; const pad={t:30,r:20,b:40,l:55}; const w=cw-pad.l-pad.r, h=ch-pad.t-pad.b;
        // Dragging to select range
        if(dragStart && e.buttons===1){ dragEnd={x:mx,y:my}; draw(); return; }
        // Hover for tooltip
        const fullN=parsed.labels.length; const startIdx=Math.max(0,zoomStart); const endIdx=zoomEnd!=null?Math.min(fullN-1,zoomEnd):fullN-1;
        const n=endIdx-startIdx+1; if(!n) return; const xstep=n>1? w/(n-1):w; const X=i=> pad.l+(i-startIdx)*xstep;
        const vis=[...(selected.size? Object.entries(parsed.series).filter(([k])=>selected.has(k)) : Object.entries(parsed.series))];
        if(!vis.length) { hoverName=null; hoverIndex=null; draw(); return; }
        let min=Infinity,max=-Infinity; vis.forEach(([,arr])=>{ for(let i=startIdx;i<=endIdx;i++){ const v=arr[i]; if(v==null||!Number.isFinite(v)) continue; if(v<min)min=v; if(v>max)max=v; }});
        if(!Number.isFinite(min)||!Number.isFinite(max)) return; const range=max-min||1; min-=range*.1; max+=range*.1; const Y=v=> pad.t+h-((v-min)/(max-min))*h;
        let bestD=Infinity, bestName=null, bestI=null;
        vis.forEach(([name,arr])=>{ for(let i=startIdx;i<=endIdx;i++){ const v=arr[i]; if(v==null) continue; const dx=X(i)-mx, dy=Y(v)-my; const d=Math.hypot(dx,dy); if(d<bestD){ bestD=d; bestName=name; bestI=i; }} });
        if(bestD<=16){ hoverName=bestName; hoverIndex=bestI; } else { hoverName=null; hoverIndex=null; }
        draw();
      });
      canvas.addEventListener('mouseup',(e)=>{
        if(!parsed||!dragStart) return;
        const rect=canvas.getBoundingClientRect(); const mx=e.clientX-rect.left; const pad={l:55}; const w=rect.width-55-20;
        if(Math.abs(mx-dragStart.x)>10){ 
          const fullN=parsed.labels.length; 
          const startIdx=Math.max(0,zoomStart); 
          const endIdx=zoomEnd!=null?Math.min(fullN-1,zoomEnd):fullN-1; 
          const n=endIdx-startIdx+1; 
          const xstep=n>1?w/(n-1):w;
          const idx1=Math.floor((Math.min(dragStart.x,mx)-pad.l)/xstep)+startIdx; 
          const idx2=Math.floor((Math.max(dragStart.x,mx)-pad.l)/xstep)+startIdx;
          const s=Math.max(0,Math.min(idx1,idx2)); 
          const e=Math.min(fullN-1,Math.max(idx1,idx2)); 
          if(e>s){ zoomStart=s; zoomEnd=e; }
        }
        dragStart=null; dragEnd=null; draw();
      });
      canvas.addEventListener('mouseleave', ()=>{ hoverName=null; hoverIndex=null; dragStart=null; dragEnd=null; draw(); });
      window.addEventListener('resize', draw);

      // init
      setAuto(false); step=1; draw();
    </script>
  </body>
</html>
